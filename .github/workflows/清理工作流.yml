name: 清理仓库工作流

on:
  workflow_dispatch:
    inputs:
      clean_mode:
        description: "清理模式 (amount--保留数量, date--保留天数)"
        required: true
        type: choice
        default: 'amount'
        options:
          - 'amount'
          - 'date'
      clean_to_keep:
        description: "保留最近工作流的天数/数量"
        required: true
        type: string
        default: "0"

jobs:
  clean-workflows:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: 安装 GitHub CLI
        run: |
          type -p gh >/dev/null || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && \
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg && \
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null && \
          sudo apt update && sudo apt install -y gh)
          gh --version

      - name: 按保留数量清理
        if: ${{ github.event.inputs.clean_mode == 'amount' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="$GITHUB_REPOSITORY"
          keep=${{ github.event.inputs.clean_to_keep }}
          current_run="$GITHUB_RUN_ID"

          # 获取所有运行（排除当前），按创建时间降序排列
          runs=$(gh run list --repo "$repo" --limit 1000 --json id,createdAt,status \
                  | jq --arg cur "$current_run" '[.[] | select(.id != ($cur | tonumber))] | sort_by(.createdAt) | reverse')
          
          total=$(echo "$runs" | jq length)
          keep=$(( keep < total ? keep : total ))   # 不能超过总数
          
          if [ "$keep" -eq 0 ]; then
            echo "将删除所有非当前运行（共 $total 个）"
            delete_ids=$(echo "$runs" | jq -r '.[].id')
          else
            keep_ids=$(echo "$runs" | jq -r '.[0:'$keep'] | .[].id')
            delete_ids=$(echo "$runs" | jq -r '.['$keep':] | .[].id')
            echo "保留最近 $keep 个运行 (ID: $keep_ids)"
          fi
          
          if [ -z "$delete_ids" ]; then
            echo "无需删除"
            exit 0
          fi
          
          echo "以下运行将被删除："
          echo "$delete_ids"
          
          for id in $delete_ids; do
            echo "删除运行 $id"
            gh run delete "$id" --repo "$repo" --confirm || echo "删除 $id 失败"
          done

      - name: 按保留天数清理
        if: ${{ github.event.inputs.clean_mode == 'date' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="$GITHUB_REPOSITORY"
          days=${{ github.event.inputs.clean_to_keep }}
          cutoff=$(date -d "$days days ago" -u +"%Y-%m-%dT%H:%M:%SZ")
          current_run="$GITHUB_RUN_ID"
          
          echo "删除 $cutoff 之前创建的所有运行（当前运行除外）"
          
          # 获取所有运行，筛选创建时间早于截止日期
          runs=$(gh run list --repo "$repo" --limit 1000 --json id,createdAt,status \
                  | jq --arg cur "$current_run" --arg cut "$cutoff" '
                      [.[] | select(.id != ($cur | tonumber) and .createdAt < $cut)] | .[].id
                    ' -r)
          
          if [ -z "$runs" ]; then
            echo "没有需要删除的运行"
            exit 0
          fi
          
          echo "以下运行将被删除："
          echo "$runs"
          
          for id in $runs; do
            echo "删除运行 $id"
            gh run delete "$id" --repo "$repo" --confirm || echo "删除 $id 失败"
          done